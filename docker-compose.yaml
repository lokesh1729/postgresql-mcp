services:
  postgres-mcp:
    image: crystaldba/postgres-mcp:latest
    container_name: postgres-mcp
    restart: unless-stopped
    # No public port mapping — service is reachable only from containers
    # attached to the coolify network (e.g. via http://postgres-mcp:8000/sse).
    expose:
      - "8000"
    environment:
      # PostgreSQL connection string. Override via .env or shell env.
      DATABASE_URI: ${DATABASE_URI:-postgresql://postgres:postgres@postgres:5432/postgres}
      # Optional: only needed for the experimental LLM-based index tuning feature.
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
    command:
      - "--transport=sse"
      - "--sse-host=0.0.0.0"
      - "--sse-port=8000"
      # Recommended for production: read-only transactions + query timeout.
      - "--access-mode=unrestricted"
      # Development only — grants full read/write. Do NOT use against prod data.
      # - "--access-mode=unrestricted"
    # Probe the SSE endpoint using the image's bundled Python (no curl/wget in
    # the container). urlopen returns 200 once the SSE stream is established.
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys,socket; socket.setdefaulttimeout(2); sys.exit(0 if urllib.request.urlopen('http://localhost:8000/sse').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - coolify
      - openclaw

networks:
  coolify:
    external: true
    name: coolify
  openclaw:
    external: true
    name: tkfstsh2f3xko4cecdajjthn
